version: 2.1

jobs:
  test_and_build:
    machine:
      image: ubuntu-2404:2025.09.1
      docker_layer_caching: true
    steps:
      - checkout
      - run:
          name: Build and run the test Docker image using docker-compose
          command: >
            docker build
            -t quizapp-api:test 
            --target test .
            
            docker-compose -f docker-compose.test.yaml up --abort-on-container-exit --exit-code-from api
      - run:
          name: Build and persist the production Docker image
          command: |
            docker build -t quizapp-api:prod --target prod .
            mkdir images && docker save -o images/prod.tar quizapp-api:prod
      - persist_to_workspace:
          root: .
          paths:
            - images
  push_ghcr:
    machine:
      image: ubuntu-2404:2025.09.1
      docker_layer_caching: true
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Load saved prod Docker image
          command: docker load -i ./images/prod.tar
      - run:
          name: Login to GHCR and push
          command: |
            echo "$GHCR_PAT" | docker login ghcr.io -u ${CIRCLE_PROJECT_USERNAME} --password-stdin
            docker tag quizapp-api:prod ghcr.io/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}:${CIRCLE_TAG}
            docker push ghcr.io/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}:${CIRCLE_TAG}

workflows:
  test_build_push:
    jobs:
      - test_and_build
      - push_ghcr:
          requires:
            - test_and_build
          context:
            - ghcr
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^\d+\.\d+\.\d+$/

